<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>why do prices rise - price tracker</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>why do prices rise?</h1>
      <p>tracking gas prices in manila and beyond</p>
    </header>

    <main>
      <div class="dashboard">
        <div class="chart-section">
          <div class="chart-container">
            <canvas id="priceChart"></canvas>
          </div>
        </div>

        <aside class="chips-section">
          <h3>event context</h3>
          <div id="chipsContainer" class="chips-container">
            <p class="placeholder">hover over data points to see related events</p>
          </div>
        </aside>
      </div>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
